<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watermark Applier</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Poppins:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,700&family=Montserrat:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700&family=Oswald:wght@400;500;600;700&family=Bebas+Neue&family=Anton&family=Permanent+Marker&family=Bangers&family=Righteous&family=Fredoka+One&family=Luckiest+Guy&family=Passion+One:wght@400;700;900&family=Russo+One&family=Black+Ops+One&family=Bungee&family=Lilita+One&family=Fugaz+One&family=Pacifico&family=Lobster&family=Satisfy&family=Dancing+Script:wght@400;700&family=Caveat:wght@400;700&family=Press+Start+2P&family=Silkscreen&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Archivo+Black&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="m21 15-5-5L5 21" />
        </svg>
        <h1>Watermark Applier</h1>
      </div>
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="applier">Applier</button>
        <button class="tab-btn" data-tab="creator">Creator</button>
      </div>
      <span class="header-badge">v1.3.0</span>
    </header>

    <!-- ==================== APPLIER TAB ==================== -->
    <main class="main tab-content active" id="tab-applier">
      <!-- Left Panel -->
      <div class="panel panel-left">
        <!-- Images Section -->
        <section class="section" id="images-section">
          <div class="section-header">
            <h2>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <path d="m21 15-5-5L5 21" />
              </svg>
              Images
            </h2>
            <span class="count" id="image-count">0</span>
          </div>
          <div class="drop-zone" id="image-drop-zone">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <p>Drop images here or <span class="browse-link">browse files</span></p>
            <span class="drop-hint">PNG, JPG, JPEG, WebP</span>
            <input type="file" id="image-input" multiple accept=".png,.jpg,.jpeg,.webp" hidden>
          </div>
          <button class="btn-add-folder" id="btn-add-folder">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
              <line x1="12" y1="11" x2="12" y2="17" />
              <line x1="9" y1="14" x2="15" y2="14" />
            </svg>
            Add Folder
            <input type="file" id="folder-input" webkitdirectory multiple hidden>
          </button>
          <div class="thumbnail-grid" id="image-grid"></div>
        </section>

        <!-- Watermarks Section -->
        <section class="section" id="watermarks-section">
          <div class="section-header">
            <h2>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              </svg>
              Watermarks
            </h2>
            <span class="count" id="watermark-count">0</span>
          </div>
          <div class="drop-zone drop-zone-small" id="watermark-drop-zone">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <p>Drop watermark PNGs or <span class="browse-link">browse</span></p>
            <input type="file" id="watermark-input" multiple accept=".png" hidden>
          </div>
          <div class="thumbnail-list" id="watermark-list"></div>
        </section>

        <!-- Process Button -->
        <button class="btn-process" id="btn-process" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Process & Download
        </button>

        <!-- Progress -->
        <div class="progress-section" id="progress-section" hidden>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-bar"></div>
          </div>
          <div class="progress-log" id="progress-log"></div>
        </div>
      </div>

      <!-- Right Panel - Preview -->
      <div class="panel panel-right">
        <div class="section-header">
          <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            Preview
          </h2>
        </div>
        <div class="preview-container" id="preview-container">
          <div class="preview-placeholder" id="preview-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <path d="m21 15-5-5L5 21" />
            </svg>
            <p>Select an image and watermark to preview</p>
          </div>
          <img id="preview-image" class="preview-image" hidden>
        </div>
      </div>
    </main>

    <!-- ==================== CREATOR TAB ==================== -->
    <main class="main tab-content" id="tab-creator">
      <!-- Left Panel - Controls -->
      <div class="panel panel-left creator-controls">
        <!-- Visual Style -->
        <section class="section">
          <div class="section-header">
            <h2>Visual Style</h2>
          </div>
          <select class="style-select" id="cr-visual-style">
            <option value="flat">Flat (Clean)</option>
            <option value="neo-brutal">Neo-Brutalism</option>
            <option value="emboss">Emboss / 3D</option>
            <option value="neon">Neon Glow</option>
            <option value="retro">Retro / Vintage</option>
            <option value="metallic">Metallic</option>
            <option value="stamp">Rubber Stamp</option>
            <option value="outline">Outline Only</option>
            <option value="comic">Comic / Pop Art</option>
            <option value="luxury">Luxury / Gold</option>
            <option value="grunge">Grunge / Distressed</option>
            <option value="pastel">Soft Pastel</option>
          </select>
        </section>

        <!-- Border Style -->
        <section class="section">
          <div class="section-header">
            <h2>Border Style</h2>
          </div>
          <div class="border-style-grid" id="border-style-grid">
            <button class="style-card active" data-style="simple" title="Simple"><svg viewBox="0 0 80 80">
                <rect x="4" y="4" width="72" height="72" fill="none" stroke="currentColor" stroke-width="3" rx="1" />
              </svg><span>Simple</span></button>
            <button class="style-card" data-style="double" title="Double"><svg viewBox="0 0 80 80">
                <rect x="3" y="3" width="74" height="74" fill="none" stroke="currentColor" stroke-width="2" />
                <rect x="9" y="9" width="62" height="62" fill="none" stroke="currentColor" stroke-width="2" />
              </svg><span>Double</span></button>
            <button class="style-card" data-style="angular" title="Angular"><svg viewBox="0 0 80 80">
                <path d="M14 2H66L78 14V66L66 78H14L2 66V14Z" fill="none" stroke="currentColor" stroke-width="2.5" />
              </svg><span>Angular</span></button>
            <button class="style-card" data-style="corners" title="Corners"><svg viewBox="0 0 80 80">
                <path d="M2 18V2H18" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M62 2H78V18" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M78 62V78H62" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M18 78H2V62" fill="none" stroke="currentColor" stroke-width="3" />
              </svg><span>Corners</span></button>
            <button class="style-card" data-style="layered" title="Layered"><svg viewBox="0 0 80 80">
                <rect x="2" y="2" width="76" height="76" fill="none" stroke="currentColor" stroke-width="2" />
                <rect x="6" y="6" width="68" height="68" fill="none" stroke="currentColor" stroke-width="1"
                  stroke-dasharray="4 2" />
                <rect x="10" y="10" width="60" height="60" fill="none" stroke="currentColor" stroke-width="2" />
              </svg><span>Layered</span></button>
            <button class="style-card" data-style="bracket" title="Bracket"><svg viewBox="0 0 80 80">
                <path d="M2 2H20" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M2 2V20" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M60 2H78" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M78 2V20" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M2 60V78" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M2 78H20" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M78 60V78" fill="none" stroke="currentColor" stroke-width="3" />
                <path d="M60 78H78" fill="none" stroke="currentColor" stroke-width="3" />
                <line x1="30" y1="2" x2="50" y2="2" stroke="currentColor" stroke-width="2" />
                <line x1="30" y1="78" x2="50" y2="78" stroke="currentColor" stroke-width="2" />
              </svg><span>Bracket</span></button>
            <button class="style-card" data-style="rounded" title="Rounded"><svg viewBox="0 0 80 80">
                <rect x="4" y="4" width="72" height="72" fill="none" stroke="currentColor" stroke-width="3" rx="12" />
              </svg><span>Rounded</span></button>
            <button class="style-card" data-style="inset" title="Inset"><svg viewBox="0 0 80 80">
                <rect x="2" y="2" width="76" height="76" fill="none" stroke="currentColor" stroke-width="3" />
                <line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="1.5" />
                <line x1="66" y1="2" x2="78" y2="14" stroke="currentColor" stroke-width="1.5" />
                <line x1="78" y1="66" x2="66" y2="78" stroke="currentColor" stroke-width="1.5" />
                <line x1="14" y1="78" x2="2" y2="66" stroke="currentColor" stroke-width="1.5" />
              </svg><span>Inset</span></button>
            <button class="style-card" data-style="wavy" title="Wavy"><svg viewBox="0 0 80 80">
                <path d="M4 10 Q14 2, 24 10 Q34 18, 44 10 Q54 2, 64 10 Q74 18, 76 10" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <path d="M4 70 Q14 78, 24 70 Q34 62, 44 70 Q54 78, 64 70 Q74 62, 76 70" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <path d="M10 4 Q2 14, 10 24 Q18 34, 10 44 Q2 54, 10 64 Q18 74, 10 76" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <path d="M70 4 Q78 14, 70 24 Q62 34, 70 44 Q78 54, 70 64 Q62 74, 70 76" fill="none" stroke="currentColor" stroke-width="2.5"/>
              </svg><span>Wavy</span></button>
            <button class="style-card" data-style="scalloped" title="Scalloped"><svg viewBox="0 0 80 80">
                <circle cx="10" cy="4" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="26" cy="4" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="42" cy="4" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="58" cy="4" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="10" cy="76" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="26" cy="76" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="42" cy="76" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="58" cy="76" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
              </svg><span>Scalloped</span></button>
            <button class="style-card" data-style="zigzag" title="Zigzag"><svg viewBox="0 0 80 80">
                <polyline points="2,8 10,2 18,8 26,2 34,8 42,2 50,8 58,2 66,8 74,2 78,8" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <polyline points="2,72 10,78 18,72 26,78 34,72 42,78 50,72 58,78 66,72 74,78 78,72" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <polyline points="8,2 2,10 8,18 2,26 8,34 2,42 8,50 2,58 8,66 2,74 8,78" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <polyline points="72,2 78,10 72,18 78,26 72,34 78,42 72,50 78,58 72,66 78,74 72,78" fill="none" stroke="currentColor" stroke-width="2.5"/>
              </svg><span>Zigzag</span></button>
            <button class="style-card" data-style="dotted" title="Dotted"><svg viewBox="0 0 80 80">
                <circle cx="8" cy="4" r="3" fill="currentColor"/><circle cx="24" cy="4" r="3" fill="currentColor"/>
                <circle cx="40" cy="4" r="3" fill="currentColor"/><circle cx="56" cy="4" r="3" fill="currentColor"/>
                <circle cx="72" cy="4" r="3" fill="currentColor"/><circle cx="8" cy="76" r="3" fill="currentColor"/>
                <circle cx="24" cy="76" r="3" fill="currentColor"/><circle cx="40" cy="76" r="3" fill="currentColor"/>
                <circle cx="56" cy="76" r="3" fill="currentColor"/><circle cx="72" cy="76" r="3" fill="currentColor"/>
                <circle cx="4" cy="20" r="3" fill="currentColor"/><circle cx="4" cy="40" r="3" fill="currentColor"/>
                <circle cx="4" cy="60" r="3" fill="currentColor"/><circle cx="76" cy="20" r="3" fill="currentColor"/>
                <circle cx="76" cy="40" r="3" fill="currentColor"/><circle cx="76" cy="60" r="3" fill="currentColor"/>
              </svg><span>Dotted</span></button>
            <button class="style-card" data-style="filmstrip" title="Film Strip"><svg viewBox="0 0 80 80">
                <rect x="2" y="2" width="76" height="76" fill="none" stroke="currentColor" stroke-width="3"/>
                <rect x="6" y="6" width="8" height="8" fill="currentColor" rx="1"/><rect x="6" y="20" width="8" height="8" fill="currentColor" rx="1"/>
                <rect x="6" y="34" width="8" height="8" fill="currentColor" rx="1"/><rect x="6" y="48" width="8" height="8" fill="currentColor" rx="1"/>
                <rect x="6" y="62" width="8" height="8" fill="currentColor" rx="1"/><rect x="66" y="6" width="8" height="8" fill="currentColor" rx="1"/>
                <rect x="66" y="20" width="8" height="8" fill="currentColor" rx="1"/><rect x="66" y="34" width="8" height="8" fill="currentColor" rx="1"/>
                <rect x="66" y="48" width="8" height="8" fill="currentColor" rx="1"/><rect x="66" y="62" width="8" height="8" fill="currentColor" rx="1"/>
              </svg><span>Film Strip</span></button>
            <button class="style-card" data-style="ticket" title="Ticket"><svg viewBox="0 0 80 80">
                <rect x="2" y="2" width="76" height="76" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="2 4" rx="4"/>
                <circle cx="2" cy="40" r="8" fill="var(--bg-secondary, #1a1d2e)"/>
                <circle cx="78" cy="40" r="8" fill="var(--bg-secondary, #1a1d2e)"/>
              </svg><span>Ticket</span></button>
            <button class="style-card" data-style="chain" title="Chain"><svg viewBox="0 0 80 80">
                <rect x="4" y="4" width="72" height="72" fill="none" stroke="currentColor" stroke-width="2"/>
                <ellipse cx="12" cy="4" rx="6" ry="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <ellipse cx="28" cy="4" rx="6" ry="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <ellipse cx="44" cy="4" rx="6" ry="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <ellipse cx="60" cy="4" rx="6" ry="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
              </svg><span>Chain</span></button>
            <button class="style-card" data-style="crossStitch" title="Cross Stitch"><svg viewBox="0 0 80 80">
                <rect x="4" y="4" width="72" height="72" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5"/>
                <line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5"/>
                <line x1="18" y1="4" x2="26" y2="12" stroke="currentColor" stroke-width="1.5"/>
                <line x1="26" y1="4" x2="18" y2="12" stroke="currentColor" stroke-width="1.5"/>
                <line x1="34" y1="4" x2="42" y2="12" stroke="currentColor" stroke-width="1.5"/>
                <line x1="42" y1="4" x2="34" y2="12" stroke="currentColor" stroke-width="1.5"/>
              </svg><span>Stitch</span></button>
            <button class="style-card" data-style="arrow" title="Arrow"><svg viewBox="0 0 80 80">
                <rect x="4" y="4" width="72" height="72" fill="none" stroke="currentColor" stroke-width="2.5"/>
                <path d="M8 4 L14 10 L8 16" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <path d="M24 4 L30 10 L24 16" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <path d="M40 4 L46 10 L40 16" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <path d="M56 4 L62 10 L56 16" fill="none" stroke="currentColor" stroke-width="1.5"/>
              </svg><span>Arrow</span></button>
            <button class="style-card" data-style="rope" title="Rope"><svg viewBox="0 0 80 80">
                <rect x="4" y="4" width="72" height="72" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="6 3"/>
                <rect x="4" y="4" width="72" height="72" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 6" stroke-dashoffset="4"/>
              </svg><span>Rope</span></button>
            <button class="style-card" data-style="network" title="Network"><svg viewBox="0 0 80 80">
                <rect x="4" y="4" width="72" height="72" fill="none" stroke="currentColor" stroke-width="2"/>
                <circle cx="4" cy="4" r="3" fill="currentColor"/><circle cx="40" cy="4" r="3" fill="currentColor"/>
                <circle cx="76" cy="4" r="3" fill="currentColor"/><circle cx="4" cy="76" r="3" fill="currentColor"/>
                <circle cx="76" cy="76" r="3" fill="currentColor"/><circle cx="40" cy="76" r="3" fill="currentColor"/>
                <line x1="4" y1="4" x2="40" y2="4" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2"/>
              </svg><span>Network</span></button>
            <button class="style-card" data-style="geoBlocks" title="Geo Blocks"><svg viewBox="0 0 80 80">
                <rect x="2" y="6" width="14" height="10" fill="currentColor" opacity="0.6"/>
                <rect x="4" y="18" width="10" height="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <rect x="0" y="38" width="12" height="8" fill="currentColor" opacity="0.4"/>
                <line x1="8" y1="16" x2="8" y2="18" stroke="currentColor" stroke-width="1.5"/>
                <line x1="6" y1="32" x2="6" y2="38" stroke="currentColor" stroke-width="1.5"/>
                <rect x="2" y="52" width="10" height="12" fill="currentColor" opacity="0.5"/>
              </svg><span>Blocks</span></button>
            <button class="style-card" data-style="bubbles" title="Bubbles"><svg viewBox="0 0 80 80">
                <circle cx="8" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="14" cy="26" r="4" fill="currentColor" opacity="0.3"/>
                <circle cx="6" cy="42" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="12" cy="58" r="6" fill="currentColor" opacity="0.4"/>
                <circle cx="5" cy="72" r="3" fill="currentColor" opacity="0.5"/>
              </svg><span>Bubbles</span></button>
            <button class="style-card" data-style="mosaic" title="Mosaic"><svg viewBox="0 0 80 80">
                <rect x="2" y="2" width="10" height="10" fill="currentColor" opacity="0.7"/>
                <rect x="14" y="2" width="7" height="10" fill="currentColor" opacity="0.4"/>
                <rect x="2" y="14" width="7" height="7" fill="currentColor" opacity="0.5"/>
                <rect x="11" y="14" width="10" height="7" fill="currentColor" opacity="0.3"/>
                <rect x="2" y="68" width="10" height="10" fill="currentColor" opacity="0.6"/>
                <rect x="68" y="2" width="10" height="10" fill="currentColor" opacity="0.5"/>
              </svg><span>Mosaic</span></button>
            <button class="style-card" data-style="floral" title="Floral"><svg viewBox="0 0 80 80">
                <circle cx="10" cy="10" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <path d="M10 5 Q14 0, 18 5" fill="none" stroke="currentColor" stroke-width="1"/>
                <path d="M10 5 Q6 0, 2 5" fill="none" stroke="currentColor" stroke-width="1"/>
                <circle cx="8" cy="40" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="10" cy="70" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
              </svg><span>Floral</span></button>
            <button class="style-card" data-style="pixelArt" title="Pixel Art"><svg viewBox="0 0 80 80">
                <rect x="0" y="0" width="8" height="8" fill="currentColor" opacity="0.8"/>
                <rect x="8" y="0" width="8" height="8" fill="currentColor" opacity="0.4"/>
                <rect x="0" y="8" width="8" height="8" fill="currentColor" opacity="0.5"/>
                <rect x="0" y="16" width="8" height="8" fill="currentColor" opacity="0.7"/>
                <rect x="8" y="16" width="8" height="8" fill="currentColor" opacity="0.3"/>
                <rect x="0" y="64" width="8" height="8" fill="currentColor" opacity="0.6"/>
              </svg><span>Pixel</span></button>
            <button class="style-card" data-style="confetti" title="Confetti"><svg viewBox="0 0 80 80">
                <rect x="4" y="6" width="6" height="3" fill="currentColor" opacity="0.7" transform="rotate(30,7,7)"/>
                <rect x="10" y="20" width="4" height="6" fill="currentColor" opacity="0.5" transform="rotate(-20,12,23)"/>
                <circle cx="6" cy="38" r="3" fill="currentColor" opacity="0.4"/>
                <rect x="3" y="50" width="8" height="3" fill="currentColor" opacity="0.6" transform="rotate(45,7,51)"/>
                <circle cx="10" cy="66" r="2" fill="currentColor" opacity="0.7"/>
              </svg><span>Confetti</span></button>
            <button class="style-card" data-style="woven" title="Woven"><svg viewBox="0 0 80 80">
                <path d="M2 5 Q10 0, 18 5 Q10 10, 2 5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <path d="M2 18 Q10 13, 18 18 Q10 23, 2 18" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <path d="M2 31 Q10 26, 18 31 Q10 36, 2 31" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <rect x="3" y="3" width="74" height="74" fill="none" stroke="currentColor" stroke-width="1"/>
              </svg><span>Woven</span></button>
            <button class="style-card" data-style="circuit" title="Circuit"><svg viewBox="0 0 80 80">
                <rect x="3" y="3" width="74" height="74" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="3" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="14" cy="12" r="2.5" fill="currentColor"/>
                <line x1="3" y1="30" x2="10" y2="30" stroke="currentColor" stroke-width="1.5"/>
                <line x1="10" y1="30" x2="10" y2="22" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="10" cy="22" r="2" fill="currentColor"/>
              </svg><span>Circuit</span></button>
          </div>
        </section>

        <!-- Fill Mode -->
        <section class="section">
          <div class="section-header">
            <h2>Fill & Colors</h2>
          </div>
          <div class="fill-mode-row">
            <button class="fill-btn active" data-fill="solid">Solid</button>
            <button class="fill-btn" data-fill="gradient">Gradient</button>
            <button class="fill-btn" data-fill="stripes">Stripes</button>
          </div>
          <div class="color-controls">
            <label class="color-field">
              <span>Color 1</span>
              <input type="color" id="cr-color1" value="#e63946">
            </label>
            <label class="color-field">
              <span>Color 2</span>
              <input type="color" id="cr-color2" value="#1d3557">
            </label>
            <label class="color-field">
              <span>Accent</span>
              <input type="color" id="cr-accent" value="#f4a261">
            </label>
          </div>
          <div class="slider-field">
            <label>Thickness <span id="cr-thickness-val">14</span>px</label>
            <input type="range" id="cr-thickness" min="4" max="50" value="14">
          </div>
        </section>

        <!-- Badges -->
        <section class="section">
          <div class="section-header">
            <h2>Badges</h2>
            <button class="btn-add-badge" id="btn-add-badge">+ Add</button>
          </div>
          <div class="badge-presets" id="badge-presets"></div>
          <div class="badge-list" id="badge-list"></div>
          <div class="typo-controls">
            <label class="typo-label">Font</label>
            <select class="style-select typo-font-select" id="cr-badge-font"></select>
            <div class="typo-row">
              <div class="typo-toggles">
                <button class="typo-toggle active" id="cr-badge-bold" title="Bold"><b>B</b></button>
                <button class="typo-toggle" id="cr-badge-italic" title="Italic"><i>I</i></button>
              </div>
              <div class="typo-size">
                <label>Size <span id="cr-badge-size-val">18</span>px</label>
                <input type="range" id="cr-badge-size" min="10" max="36" value="18">
              </div>
            </div>
          </div>
        </section>

        <!-- Store Name -->
        <section class="section">
          <div class="section-header">
            <h2>Store Name (optional)</h2>
          </div>
          <input type="text" id="cr-store-name" placeholder="e.g. MyStore" class="text-input">
          <div class="typo-controls">
            <label class="typo-label">Font</label>
            <select class="style-select typo-font-select" id="cr-store-font"></select>
            <div class="typo-row">
              <div class="typo-toggles">
                <button class="typo-toggle active" id="cr-store-bold" title="Bold"><b>B</b></button>
                <button class="typo-toggle" id="cr-store-italic" title="Italic"><i>I</i></button>
              </div>
              <div class="typo-size">
                <label>Size <span id="cr-store-size-val">20</span>px</label>
                <input type="range" id="cr-store-size" min="12" max="42" value="20">
              </div>
            </div>
          </div>
        </section>

        <!-- Export -->
        <button class="btn-process" id="btn-export">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Export as PNG
        </button>
      </div>

      <!-- Right Panel - Canvas Preview -->
      <div class="panel panel-right">
        <div class="section-header">
          <h2>Preview</h2>
        </div>
        <div class="preview-container creator-preview-container">
          <canvas id="creator-canvas" width="800" height="800"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
  <script src="/creator.js"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>

</html>
